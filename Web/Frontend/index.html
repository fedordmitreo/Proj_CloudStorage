<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход / Регистрация</title>
    <link rel="stylesheet" href="static/style.css">

    <style>
        /* Стиль для кнопки смены языка */
        #languageSwitcher {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }

        #langSelect {
            padding: 8px 12px;
            font-size: 14px;
            border-radius: 5px;
            border: none;
            background-color: #007BFF;
            color: white;
            cursor: pointer;
        }

        #langSelect option {
            background-color: white;
            color: black;
        }
    </style>
</head>
<body>

<div id="languageSwitcher">
    <select id="langSelect">
        <option value="ru">🇷🇺 Русский</option>
        <option value="en">🇬🇧 English</option>
    </select>
</div>

<div class="container">
    <div class="form-container sign-in-container">
        <form action="#" method="post">
            <h1 data-lang="signin">Вход</h1>
            <input type="email" placeholder="Email" required />
            <input type="password" placeholder="password" required />
            <a href="Dashboard.html" data-lang="forget">Забыли пароль?</a>
            <button type="submit" data-lang="signin">Войти</button>
        </form>
    </div>


    <div class="form-container sign-up-container">
        <form action="#" method="signup">
            <h1 data-lang="registration" data-lang="signip">Регистрация</h1>
            <input type="text" placeholder="Name" required />
            <input type="email" placeholder="Email" required />
            <input type="password" placeholder="password" required />
            <button type="submit" data-lang="signup">Зарегистрироваться</button>
        </form>
    </div>
    <div class="overlay-container">
        <div class="overlay">
            <div class="overlay-panel overlay-left">
                <h1 data-lang="welcome">Привет!</h1>
                <p data-lang="description-singin">Чтобы войти, нажмите "Войти"</p>
                <button class="ghost" id="signIn" data-lang="signin">Войти</button>
            </div>
            <div class="overlay-panel overlay-right">
                <h1 data-lang="welcome">Привет!</h1>
                <p data-lang="description-singup">Введите свои данные и зарегистрируйтесь</p>
                <button class="ghost" id="signUp" data-lang="signup">Регистрация</button>
            </div>
        </div>
    </div>
</div>
<script src="main.js"></script>
</body>
</html>
