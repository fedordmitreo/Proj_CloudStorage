<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Личный кабинет</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<!-- Левое меню -->
<div class="sidebar">
  <h2><a href="#" data-lang="my_files" onclick="showSection('files')">Ваши файлы</a></h2> 
  <h2><a href="#" data-lang="trash" onclick="showSection('trash')">Корзина</a></h2>
</div>

<!-- Основной контент -->
<div class="main">
  <div class="top-nav">
    <div class="account-icon" title="Аккаунт">👤</div>
    <select id="langSelect">
      <option value="ru">🇷🇺 Русский</option>
      <option value="en">🇬🇧 English</option>
    </select>
  </div>

  <div class="content">
    <h1 data-lang="welcome_dashboard">Добро пожаловать в ваш кабинет!</h1>
    <div id="sectionContent"></div>
  </div>
</div>

<script src="/dashboard.js"></script>

</html>
